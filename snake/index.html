<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>Snake</h1>
    <section class="hud" aria-live="polite">
      <div>Score: <span id="score">0</span></div>
      <div>Status: <span id="status">Running</span></div>
    </section>

    <div class="board-wrap">
      <canvas id="board" width="400" height="400" aria-label="Snake game board"></canvas>
    </div>

    <section class="controls">
      <button id="pauseBtn" type="button">Pause</button>
      <button id="restartBtn" type="button">Restart</button>
    </section>

    <section class="touch-controls" aria-label="Directional controls">
      <button data-dir="up" type="button">Up</button>
      <div>
        <button data-dir="left" type="button">Left</button>
        <button data-dir="down" type="button">Down</button>
        <button data-dir="right" type="button">Right</button>
      </div>
    </section>

    <p class="hint">Controls: Arrow keys or WASD. Press P to pause/resume.</p>
  </main>

  <script type="module" src="src/snake-game.js"></script>
</body>
</html>
